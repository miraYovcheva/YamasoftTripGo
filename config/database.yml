# PostgreSQL. See https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for the full configuration options.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: yamasoft_trip_go_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: yamasoft_trip_go_test

production:
  primary:
    <<: *default
    database: yamasoft_trip_go_production
  cache:
    <<: *default
    database: yamasoft_trip_go_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: yamasoft_trip_go_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: yamasoft_trip_go_production_cable
    migrations_paths: db/cable_migrate
